<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Jimbo Pomo — Options</title>
  <link rel="stylesheet" href="options.css" />
</head>
<body>
  <h1>Jimbo Pomo</h1>
  <p class="hint">
    Enter your <strong>jimbo.fourfoldmedia.uk</strong> basic auth credentials.<br />
    These are stored locally in your browser and never sent anywhere except Jimbo.
  </p>
  <form autocomplete="off">
    <label>
      Username
      <input id="username" type="text" autocomplete="off" placeholder="marvin" />
    </label>
    <label>
      Password
      <input id="password" type="password" autocomplete="new-password" placeholder="••••••••" />
    </label>
    <label>
      Default duration (min)
      <input id="duration" type="number" min="1" max="180" value="25" />
    </label>
    <div class="actions">
      <button id="save-btn" type="button">Save</button>
      <span id="status"></span>
    </div>
  </form>
  <script src="options.js"></script>
</body>
</html>
