<div class="app-shell" [style.--section-accent]="sectionAccent()">
  <header class="app-header">
    <div class="app-topbar">
      <div class="app-topbar__commands">
        <button type="button" class="app-topbar__cmd" (click)="shortcuts.openSearch()" aria-label="Open search">
          Search <kbd>/</kbd>
        </button>
        <button type="button" class="app-topbar__cmd" (click)="shortcuts.openCapture()" aria-label="Open capture">
          Capture <kbd>C</kbd>
        </button>
      </div>
    </div>
    <div class="app-header__inner">
      <app-nav />
    </div>
  </header>

  <main class="app-main">
    <div class="app-main__inner">
      <router-outlet />
    </div>
  </main>
</div>
<app-toast-stack />
