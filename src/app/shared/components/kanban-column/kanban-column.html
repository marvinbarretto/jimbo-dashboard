<section
  class="col"
  [class.col--drop-eligible]="dropEligible()"
  [class.col--drop-active]="dropActive()"
  [class.col--drop-disabled]="dropDisabled()"
  [class.col--loading]="loading()"
  (dragover)="onDragOver($event)"
  (dragleave)="onDragLeave()"
  (drop)="onDrop($event)"
>
  <header class="col__header">
    <span class="col__label">{{ label() }}</span>
    <span class="col__count">{{ count() }}</span>
  </header>

  <div class="col__cards">
    @if (loading()) {
      <div class="col__skeleton" aria-hidden="true">
        <div class="col__skeleton-card"></div>
        <div class="col__skeleton-card"></div>
        <div class="col__skeleton-card"></div>
      </div>
    } @else {
      <ng-content />
      @if (count() === 0) {
        <p class="col__empty">{{ emptyLabel() }}</p>
      }
    }
  </div>
</section>
