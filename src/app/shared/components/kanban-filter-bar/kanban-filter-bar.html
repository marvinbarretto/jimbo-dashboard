<div class="filters" role="region" aria-label="Filter cards">
  <div class="filters__search">
    <input
      type="search"
      class="filters__search-input"
      [value]="searchTerm()"
      [placeholder]="searchPlaceholder()"
      [attr.aria-label]="searchPlaceholder()"
      (input)="onSearchInput($event)"
    />
  </div>

  @for (group of groups(); track group.id) {
    <div class="filters__group">
      <span class="filters__label">{{ group.label }}</span>
      @for (opt of group.options; track opt.value) {
        <app-chip
          [active]="group.active.has(opt.value)"
          [disabled]="opt.count === 0 && !group.active.has(opt.value)"
          [count]="opt.count"
          [tone]="opt.tone ?? null"
          (toggle)="onToggle(group.id, opt.value)"
        >{{ opt.label }}</app-chip>
      }
    </div>
  }

  @if (hasActive()) {
    <button type="button" class="filters__reset" (click)="reset.emit()">
      Reset filters
    </button>
  }
</div>
