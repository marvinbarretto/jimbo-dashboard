<div class="actors-list">
  <header class="actors-list__header">
    <h1>Actors</h1>
    <a routerLink="new" class="btn btn--primary">Add actor</a>
  </header>

  <table class="actors-table">
    <thead>
      <tr>
        <th>ID</th>
        <th>Display name</th>
        <th>Kind</th>
        <th>Runtime</th>
        <th>Active</th>
        <th></th>
      </tr>
    </thead>
    <tbody>
      @for (actor of actors(); track actor.id) {
        <tr [class.inactive]="!actor.is_active">
          <td class="actor-id">
            <a [routerLink]="[actor.id]">{{ actor.id }}</a>
          </td>
          <td>{{ actor.display_name }}</td>
          <td>
            <span [class]="'kind kind--' + actor.kind">{{ actor.kind }}</span>
          </td>
          <td>{{ actor.runtime ?? '—' }}</td>
          <td>
            <span [class]="actor.is_active ? 'status status--active' : 'status status--inactive'">
              {{ actor.is_active ? 'active' : 'inactive' }}
            </span>
          </td>
          <td class="actions">
            <a [routerLink]="[actor.id, 'edit']">Edit</a>
            <button (click)="remove(actor.id)">Remove</button>
          </td>
        </tr>
      } @empty {
        <tr>
          <td colspan="6" class="empty">No actors registered.</td>
        </tr>
      }
    </tbody>
  </table>
</div>
