<div class="filters" role="region" aria-label="Filter cards">
  <div class="filters__group">
    <span class="filters__label">Project</span>
    @for (opt of projectOptions(); track opt.value) {
      <app-chip
        [active]="projectActive().has(opt.value)"
        [disabled]="opt.count === 0 && !projectActive().has(opt.value)"
        [count]="opt.count"
        [tone]="opt.tone ?? null"
        (toggle)="toggleProject.emit(opt.value)"
      >{{ opt.label }}</app-chip>
    }
  </div>

  <div class="filters__group">
    <span class="filters__label">Owner</span>
    @for (opt of ownerOptions(); track opt.value) {
      <app-chip
        [active]="ownerActive().has(opt.value)"
        [disabled]="opt.count === 0 && !ownerActive().has(opt.value)"
        [count]="opt.count"
        [tone]="opt.tone ?? null"
        (toggle)="toggleOwner.emit(opt.value)"
      >{{ opt.label }}</app-chip>
    }
  </div>

  <div class="filters__group">
    <span class="filters__label">Priority</span>
    @for (opt of priorityOptions(); track opt.value) {
      <app-chip
        [active]="priorityActive().has(opt.value)"
        [disabled]="opt.count === 0 && !priorityActive().has(opt.value)"
        [count]="opt.count"
        [tone]="opt.tone ?? null"
        (toggle)="togglePriority.emit(opt.value)"
      >{{ opt.label }}</app-chip>
    }
  </div>

  @if (hasActive()) {
    <button type="button" class="filters__reset" (click)="reset.emit()">
      Reset filters
    </button>
  }
</div>
