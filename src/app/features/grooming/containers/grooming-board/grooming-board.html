<div class="board">
  <header class="board__header">
    <h1>Grooming pipeline</h1>
    <p class="board__hint">
      Drag a card to move it between columns. Each move emits a
      <code>grooming_status_changed</code> event.
    </p>
  </header>

  <!-- Mobile filter toggle — desktop always shows filter bar, mobile hides it behind this button -->
  <button
    type="button"
    class="board__filter-toggle"
    [class.board__filter-toggle--active]="hasActiveFilters()"
    (click)="showMobileFilters.update(v => !v)"
    [attr.aria-expanded]="showMobileFilters()"
  >
    filter
    @if (hasActiveFilters()) {
      <span class="board__filter-dot" aria-hidden="true"></span>
    }
    <span class="board__filter-caret">{{ showMobileFilters() ? '▲' : '▼' }}</span>
  </button>

  <app-kanban-filter-bar
    [class.board__filters--collapsed]="!showMobileFilters()"
    [groups]="filterGroups()"
    [searchTerm]="searchTerm()"
    [sortOptions]="sortOptions"
    [activeSort]="sortMode()"
    searchPlaceholder="Search title or #seq…"
    (toggle)="onFilterToggle($event)"
    (searchChange)="onSearchChange($event)"
    (sortChange)="onSortChange($event)"
    (reset)="resetFilters()"
  />

  <!-- Mobile column switcher — hidden on desktop via CSS, scrolls horizontally -->
  <div class="board__mobile-switcher" role="tablist" aria-label="Select column">
    @for (col of columns(); track col.status) {
      <button
        type="button"
        class="board__col-chip"
        [class.board__col-chip--active]="mobileColumn() === col.status"
        role="tab"
        [attr.aria-selected]="mobileColumn() === col.status"
        (click)="setMobileColumn(col.status)"
      >
        {{ col.label }}
        <span class="board__col-count">{{ col.cards.length }}</span>
      </button>
    }
  </div>

  <div class="board__columns">
    @for (col of columns(); track col.status) {
      <div class="board__col-wrap" [class.board__col-wrap--active]="mobileColumn() === col.status">
      <app-kanban-column
        [label]="col.label"
        [count]="col.cards.length"
        [emptyLabel]="col.emptyLabel"
        [loading]="isLoading()"
        [dropEligible]="drag.isEligibleDropTarget(col.status)"
        [dropActive]="drag.dropTarget() === col.status"
        (dragover)="onColumnDragOver($event, col.status)"
        (dragleave)="onColumnDragLeave(col.status)"
        (drop)="onColumnDrop($event, col.status)"
      >
        @for (item of col.cards; track item.id) {
          <app-grooming-nest
            [parentSeq]="parentRef(item)?.seq ?? null"
            [parentTitle]="parentRef(item)?.title ?? ''"
          >
            <app-grooming-card
              [item]="item"
              [project]="primaryProject(item)"
              [openQuestionsCount]="openQuestionsCount(item)"
              [childrenCount]="childrenCount(item)"
              [epicPriority]="rolledUpPriorityForEpic(item)"
              [lastActivityAt]="lastActivityAt(item)"
              [liveSnapshot]="liveSnapshot(item)"
              [daysInColumn]="daysInColumn(item)"
              [source]="sourceSummary(item)"
              [openQuestion]="firstOpenQuestion(item)"
              [assignOptions]="assignableActors()"
              [dragging]="drag.dragging() === item.id"
              (dragstart)="onDragStart($event, item)"
              (dragend)="onDragEnd()"
              (archive)="onArchiveItem(item)"
              (assign)="onAssignItem(item, $event)"
            />
          </app-grooming-nest>
        }
      </app-kanban-column>
      </div>
    }
  </div>
</div>
