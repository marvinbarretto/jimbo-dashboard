<div class="thread-view">

  <header class="thread-view__header">
    <div class="thread-view__header-copy">
      <span class="thread-view__label">Conversation</span>
      <span class="thread-view__summary">
        <strong>{{ totalCount() }}</strong> messages
        @if (openCount() > 0) {
          ·
          <strong class="thread-view__open-count">{{ openCount() }} open {{ openCount() === 1 ? 'question' : 'questions' }}</strong>
        }
      </span>
    </div>
    <span
      class="thread-view__status"
      [class.thread-view__status--alert]="openCount() > 0">
      {{ openCount() > 0 ? 'needs reply' : 'clear' }}
    </span>
  </header>

  <app-message-list
    [messages]="messages()"
    [actors]="actorMap()"
    [attachmentsByMessage]="attachmentsByMessage()"
  />

  <app-message-composer
    [vaultItemId]="vaultItemId()"
    [currentActor]="currentActor()"
    [availableQuestions]="openQuestions()"
    (posted)="onPosted($event)"
  />

</div>
