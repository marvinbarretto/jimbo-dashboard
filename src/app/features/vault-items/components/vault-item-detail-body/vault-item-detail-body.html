@if (item(); as item) {
  <div class="vault-item-detail">

    <app-vault-item-identity-header
      [item]="item"
      (titleChange)="onTitleChange($event)"
    />

    <div class="vault-item-detail__zone2">
      <app-vault-item-status-chips
        [item]="item"
        [owner]="owner()"
        [lifecycle]="lifecycleOf(item)"
        [isArchived]="isItemArchived(item)"
        [effectivePriority]="effectivePriority()"
        [priorityDiverges]="priorityDiverges()"
        [firstProject]="projects()[0]"
        [isGitHubItem]="isGitHubItem()"
        [activeActors]="activeActors()"
        (statusChange)="onStatusChange($event)"
        (reassign)="reassign($event)"
      />

      <app-vault-item-meta-line
        [createdAt]="item.created_at"
        [lastActivityAt]="lastActivityAt()"
        [completedAt]="item.completed_at"
        [archivedAt]="item.archived_at"
        [dueAt]="item.due_at"
        [rationale]="item.ai_rationale"
        [rationaleExpanded]="rationaleExpanded()"
        (toggleRationale)="toggleRationale()"
      />

      <app-vault-item-overview-cards
        [source]="sourceSummary()"
        [hierarchy]="hierarchySummary()"
        [timeline]="timelineSummary()"
        [queue]="queueSummary()"
      />
    </div>

    @if (showRejectForm()) {
      <app-reject-form
        [itemId]="item.id"
        [currentOwner]="item.assigned_to"
        [recentEvents]="events()"
        [availableActors]="availableActors()"
        (cancelled)="closeReject()"
        (submitted)="onRejectSubmitted($event)"
      />
    }

    <app-vault-item-questions
      [questions]="openQuestions()"
      [vaultItemId]="item.id"
      [currentActor]="currentActorId"
      (replyPosted)="onDetailReplyPosted($event)"
    />

    <app-ui-section
      title="Body"
      [expanded]="sectionBody()"
      [meta]="'intake · delivery · links ' + (sectionBody() ? '▴' : '▾')"
      (toggled)="toggleSection('body')">
      <div class="vault-item-detail__body-layout">
        <app-vault-item-intake-block
          [body]="item.body"
          [createdAt]="item.created_at"
          [editable]="isManual()"
          (bodyChange)="onBodyChange($event)"
        />

        <app-vault-item-delivery-block
          [readiness]="readiness()"
          [criteria]="item.acceptance_criteria"
        />

        <app-vault-item-links-block
          [subtasks]="children()"
          [projects]="projects()"
          [activeProjects]="activeProjects()"
          [openBlockers]="openBlockers()"
          [tags]="item.tags"
          [addBlockerSeqInput]="addBlockerSeqInput()"
          (subtaskClicked)="swapToSeq($event)"
          (projectClicked)="onProjectClicked($event)"
          (projectAdded)="addProject($event)"
          (projectRemoved)="removeProject($event)"
          (blockerClicked)="swapToSeq($event)"
          (blockerRemoved)="removeBlocker($event)"
          (blockerAddBySeq)="addBlockerBySeq()"
          (blockerSeqInputChange)="addBlockerSeqInput.set($event)"
        />
      </div>
    </app-ui-section>

    <app-ui-section
      title="Activity"
      tone="subtle"
      [expanded]="sectionActivity()"
      [meta]="'timeline · filters · ' + events().length + ' events ' + (sectionActivity() ? '▴' : '▾')"
      (toggled)="toggleSection('activity')">
      <app-activity-log
        [events]="events()"
        [actorLabel]="actorLabelFn"
        [actorKind]="actorKindFn"
      />
    </app-ui-section>

    <app-ui-section
      title="Thread"
      tone="subtle"
      [expanded]="sectionThread()"
      [meta]="'conversation · ' + messages().length + ' messages ' + (sectionThread() ? '▴' : '▾')"
      (toggled)="toggleSection('thread')">
      <app-thread-view
        [vaultItemId]="item.id"
        [currentActor]="currentActorId"
        [actorMap]="actorMap()">
      </app-thread-view>
    </app-ui-section>

    <app-vault-item-action-bar
      [editRoute]="['/vault-items', item.seq, 'edit']"
      [canReject]="canReject()"
      [isArchived]="isItemArchived(item)"
      (rejected)="openReject()"
      (archived)="archive()"
      (deleted)="deleteItem()"
    />

  </div>
} @else {
  <div class="vault-item-not-found">
    <a routerLink="/vault-items" class="back-link">← Vault</a>
    <p>Item not found.</p>
  </div>
}
