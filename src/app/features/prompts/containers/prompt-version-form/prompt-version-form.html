<div class="version-form">
  <header class="version-form__header">
    <a [routerLink]="['/prompts', promptId()]" class="back-link">← {{ prompt()?.display_name ?? 'Prompt' }}</a>
    <h1>Add version</h1>
  </header>

  @if (prompt()?.current_version_id) {
    <p class="version-form__hint">
      Branching from the current version. The new version will be set as current automatically.
    </p>
  } @else {
    <p class="version-form__hint">This will be the first version and set as current.</p>
  }

  <form [formGroup]="form" (ngSubmit)="submit()">
    <div class="field">
      <label for="system_content">System prompt</label>
      <textarea id="system_content" rows="10" formControlName="system_content"
        placeholder="You are a helpful assistant…"></textarea>
    </div>

    <div class="field">
      <label for="user_content">
        User template
        <span class="hint">(optional — use {{ '{{' }}variable{{ '}}' }} for substitutions)</span>
      </label>
      <textarea id="user_content" rows="6" formControlName="user_content"
        placeholder="Summarise the following: {{'{{'}}content{{'}}'}}"></textarea>
    </div>

    <div class="field">
      <label for="notes">Notes <span class="hint">(what changed, why)</span></label>
      <input id="notes" type="text" formControlName="notes"
        placeholder="Tightened JSON instruction; improved parse rate" />
    </div>

    <div class="form-actions">
      <button type="submit" class="btn btn--primary">Save version</button>
      <a [routerLink]="['/prompts', promptId()]" class="btn btn--ghost">Cancel</a>
    </div>
  </form>
</div>
