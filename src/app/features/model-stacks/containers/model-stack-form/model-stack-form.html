<div class="stack-form">
  <header class="stack-form__header">
    <a routerLink="/model-stacks" class="back-link">← Stacks</a>
    <h1>{{ isEdit() ? 'Edit stack' : 'New stack' }}</h1>
    @if (stackId(); as id) {
      <p class="stack-form__id"><code>{{ id }}</code></p>
    }
  </header>

  <form [formGroup]="form" (ngSubmit)="submit()" class="stack-form__form">
    @if (!isEdit()) {
      <label class="field">
        <span class="field__label">ID <small>(slug — lowercase + hyphens)</small></span>
        <input type="text" formControlName="id" placeholder="claude-cheap-to-premium" />
      </label>
    }

    <label class="field">
      <span class="field__label">Name</span>
      <input type="text" formControlName="name" />
    </label>

    <label class="field">
      <span class="field__label">Description</span>
      <input type="text" formControlName="description" placeholder="Try Haiku, fall back to Sonnet, then Opus." />
    </label>

    <label class="field">
      <span class="field__label">Chain <small>(one model id per line, primary first)</small></span>
      <textarea formControlName="chain" rows="6" placeholder="anthropic/claude-haiku-4-5-20251001&#10;anthropic/claude-sonnet-4-6&#10;anthropic/claude-opus-4-7"></textarea>
    </label>

    <label class="field field--inline">
      <input type="checkbox" formControlName="is_active" />
      <span>Active <small>(uncheck to retain doc but mark unused)</small></span>
    </label>

    <label class="field">
      <span class="field__label">Notes</span>
      <textarea formControlName="body" rows="8"></textarea>
    </label>

    @if (saveError(); as err) {
      <p class="error">{{ err }}</p>
    }

    <div class="stack-form__actions">
      @if (isEdit()) {
        <button type="button" class="btn btn--danger" (click)="delete()" [disabled]="saving()">Delete</button>
        <a [routerLink]="['/model-stacks', stackId()]" class="btn">Cancel</a>
      } @else {
        <a routerLink="/model-stacks" class="btn">Cancel</a>
      }
      <button type="submit" class="btn btn--primary" [disabled]="saving() || form.invalid">
        {{ saving() ? 'Saving…' : (isEdit() ? 'Save' : 'Create') }}
      </button>
    </div>
  </form>
</div>
