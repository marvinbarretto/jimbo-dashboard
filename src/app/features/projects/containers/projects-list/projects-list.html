<app-ui-stack class="projects-list" gap="lg">
  <app-ui-page-header class="projects-list__header">
    <h1 uiPageHeaderTitle>Projects</h1>
    <a uiPageHeaderActions routerLink="new" class="btn btn--primary">Add project</a>
  </app-ui-page-header>

  <app-ui-data-table
    ariaLabel="Projects"
    caption="Browse projects and sort columns before opening a detail or edit view."
    [columns]="columns"
    [data]="projects()"
    [rowClass]="projectRowClass"
    emptyTitle="No projects registered"
    emptyMessage="Create the first project to start organizing dashboard work." />

  <ng-template #idCell let-context>
    <a [routerLink]="[context.row.original.id]">{{ context.getValue() }}</a>
  </ng-template>

  <ng-template #statusCell let-context>
    <app-ui-badge [tone]="statusTone(context.getValue())">
      {{ context.getValue() }}
    </app-ui-badge>
  </ng-template>

  <ng-template #actionsCell let-context>
    <app-ui-cluster justify="end" gap="sm">
      <a [routerLink]="[context.row.original.id, 'edit']">Edit</a>
      <button type="button" (click)="remove(context.row.original.id)">Remove</button>
    </app-ui-cluster>
  </ng-template>
</app-ui-stack>
