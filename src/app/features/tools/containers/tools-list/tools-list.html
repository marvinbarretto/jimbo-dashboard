<div class="tools-list">
  <header class="tools-list__header">
    <h1>Tools</h1>
    <a routerLink="new" class="btn btn--primary">Add tool</a>
  </header>

  <table class="tools-table">
    <thead>
      <tr>
        <th>ID</th>
        <th>Name</th>
        <th>Handler</th>
        <th>Versions</th>
        <th>Active</th>
        <th></th>
      </tr>
    </thead>
    <tbody>
      @for (tool of tools(); track tool.id) {
        <tr [class.inactive]="!tool.is_active">
          <td class="tool-id">
            <a [routerLink]="[tool.id]">{{ tool.id }}</a>
          </td>
          <td>{{ tool.display_name }}</td>
          <td><code>{{ tool.handler_type }}</code></td>
          <td>
            @if (tool.current_version_id) {
              <span class="badge badge--active">versioned</span>
            } @else {
              <span class="badge badge--empty">no versions</span>
            }
          </td>
          <td>{{ tool.is_active ? 'Yes' : 'No' }}</td>
          <td class="actions">
            <a [routerLink]="[tool.id, 'edit']">Edit</a>
            <button (click)="remove(tool.id)">Remove</button>
          </td>
        </tr>
      } @empty {
        <tr>
          <td colspan="6" class="empty">No tools configured.</td>
        </tr>
      }
    </tbody>
  </table>
</div>
