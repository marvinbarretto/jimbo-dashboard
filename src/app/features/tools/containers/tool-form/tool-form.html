<div class="tool-form">
  <header class="tool-form__header">
    <a routerLink="/tools" class="back-link">← Tools</a>
    <h1>{{ isEdit() ? 'Edit tool' : 'Add tool' }}</h1>
  </header>

  <form [formGroup]="form" (ngSubmit)="submit()">
    <div class="field">
      <label for="id">ID <span class="hint">(slug: e.g. search-web)</span></label>
      @if (isEdit()) {
        <input id="id" type="text" [value]="form.getRawValue().id" readonly />
      } @else {
        <input id="id" type="text" formControlName="id" />
      }
    </div>

    <div class="field">
      <label for="display_name">Display name</label>
      <input id="display_name" type="text" formControlName="display_name" />
    </div>

    <div class="field">
      <label for="handler_type">Handler type</label>
      <select id="handler_type" formControlName="handler_type">
        <option value="webhook">webhook</option>
        <option value="builtin">builtin</option>
        <option value="mcp">mcp</option>
      </select>
    </div>

    <div class="field">
      <label for="endpoint_url">Endpoint URL <span class="hint">(optional for builtins)</span></label>
      <input id="endpoint_url" type="text" formControlName="endpoint_url" placeholder="https://…" />
    </div>

    <div class="field field--checkbox">
      <input id="is_active" type="checkbox" formControlName="is_active" />
      <label for="is_active">Active</label>
    </div>

    <div class="form-actions">
      <button type="submit" class="btn btn--primary">
        {{ isEdit() ? 'Save changes' : 'Add tool' }}
      </button>
      <a routerLink="/tools" class="btn btn--ghost">Cancel</a>
    </div>
  </form>
</div>
