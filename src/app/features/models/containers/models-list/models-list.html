<app-ui-stack class="models-list" gap="lg">
  <app-ui-page-header class="models-list__header">
    <h1 uiPageHeaderTitle>Models</h1>
    <p uiPageHeaderHint>
      LLMs you're tracking. Edits commit + push to <code>hub/models/</code> via jimbo-api.
    </p>
    <a uiPageHeaderActions routerLink="new" class="btn btn--primary">Add model</a>
  </app-ui-page-header>

  @if (isLoading()) {
    <app-ui-loading-state label="Loading models" message="Fetching the tracked model registry." />
  } @else if (error()) {
    <app-ui-empty-state
      title="Failed to load models"
      [message]="'The model registry could not be loaded. ' + error()" />
  } @else {
    <app-ui-data-table
      ariaLabel="Models"
      caption="Compare tracked models by provider, status, context window, and price."
      [columns]="columns"
      [data]="models()"
      [rowClass]="modelRowClass"
      emptyTitle="No models tracked yet"
      emptyMessage="Add a model to start building the registry." />
  }

  <ng-template #providerCell let-context>
    <span class="provider-tag">{{ context.getValue() ?? '—' }}</span>
  </ng-template>

  <ng-template #nameCell let-context>
    <a [routerLink]="modelLink(context.row.original.id)">{{ context.getValue() }}</a>
  </ng-template>

  <ng-template #statusCell let-context>
    <app-ui-badge [tone]="statusTone(context.getValue())">
      {{ context.getValue() }}
    </app-ui-badge>
  </ng-template>
</app-ui-stack>
