<div class="model-form">
  <header class="model-form__header">
    <a routerLink="/models" class="back-link">← Models</a>
    <h1>{{ isEdit() ? 'Edit model' : 'Add model' }}</h1>
  </header>

  <form [formGroup]="form" (ngSubmit)="submit()">
    <div class="field">
      <label for="id">ID <span class="hint">(OpenRouter format: provider/model-name)</span></label>
      <input id="id" formControlName="id" [attr.disabled]="isEdit() ? true : null" />
      @if (form.controls.id.touched && form.controls.id.errors?.['pattern']) {
        <p class="field-error" role="alert">ID must be in the format provider/name (e.g. openai/gpt-5-nano).</p>
      }
    </div>

    <div class="field">
      <label for="display_name">Display name</label>
      <input id="display_name" formControlName="display_name" />
    </div>

    <div class="field">
      <label for="provider">Provider</label>
      <select id="provider" formControlName="provider">
        @for (p of providers; track p) {
          <option [value]="p">{{ p }}</option>
        }
      </select>
    </div>

    <div class="field">
      <label for="tier">Tier</label>
      <select id="tier" formControlName="tier">
        @for (t of tiers; track t) {
          <option [value]="t">{{ t }}</option>
        }
      </select>
    </div>

    <div class="field">
      <label>Capabilities</label>
      <div class="capability-checks">
        <label class="check-item"><input type="checkbox" formControlName="cap_code" /> Code</label>
        <label class="check-item"><input type="checkbox" formControlName="cap_text" /> Text</label>
        <label class="check-item"><input type="checkbox" formControlName="cap_vision" /> Vision</label>
        <label class="check-item"><input type="checkbox" formControlName="cap_reasoning" /> Reasoning</label>
        <label class="check-item"><input type="checkbox" formControlName="cap_math" /> Math</label>
        <label class="check-item"><input type="checkbox" formControlName="cap_video" /> Video</label>
      </div>
    </div>

    <div class="field">
      <label for="context_window">Context window (tokens)</label>
      <input id="context_window" type="number" formControlName="context_window" />
    </div>

    <div class="field">
      <label for="input_cost_per_mtok">Input cost ($ per M tokens)</label>
      <input id="input_cost_per_mtok" type="number" step="0.001" formControlName="input_cost_per_mtok" />
    </div>

    <div class="field">
      <label for="output_cost_per_mtok">Output cost ($ per M tokens)</label>
      <input id="output_cost_per_mtok" type="number" step="0.001" formControlName="output_cost_per_mtok" />
    </div>

    <div class="field field--checkbox">
      <input id="is_active" type="checkbox" formControlName="is_active" />
      <label for="is_active">Active</label>
    </div>

    <div class="field">
      <label for="notes">Notes</label>
      <textarea id="notes" formControlName="notes" rows="3"></textarea>
    </div>

    <div class="form-actions">
      <button type="submit" class="btn btn--primary">
        {{ isEdit() ? 'Save changes' : 'Add model' }}
      </button>
      <a routerLink="/models" class="btn btn--ghost">Cancel</a>
    </div>
  </form>
</div>
