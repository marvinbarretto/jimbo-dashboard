<div class="model-form">
  <header class="model-form__header">
    <a routerLink="/models" class="back-link">← Models</a>
    <h1>{{ isEdit() ? 'Edit model' : 'New model' }}</h1>
    @if (modelId(); as id) {
      <p class="model-form__id"><code>{{ id }}</code></p>
    }
  </header>

  <form [formGroup]="form" (ngSubmit)="submit()" class="model-form__form">
    @if (!isEdit()) {
      <label class="field">
        <span class="field__label">ID <small>(provider/name — e.g. anthropic/claude-haiku-4-5)</small></span>
        <input type="text" formControlName="id" placeholder="anthropic/claude-haiku-4-5-20251001" />
      </label>
    }

    <label class="field">
      <span class="field__label">Name <small>(usually the model id slug)</small></span>
      <input type="text" formControlName="name" />
    </label>

    <label class="field">
      <span class="field__label">Description</span>
      <input type="text" formControlName="description" placeholder="Cheap, fast, good for grooming." />
    </label>

    <fieldset class="field-group">
      <legend>Tracking</legend>

      <label class="field">
        <span class="field__label">Status</span>
        <select formControlName="status">
          @for (s of statuses; track s) {
            <option [value]="s">{{ s }}</option>
          }
        </select>
      </label>

      <label class="field">
        <span class="field__label">Provider</span>
        <input type="text" formControlName="provider" placeholder="anthropic" />
      </label>

      <label class="field">
        <span class="field__label">Context window <small>(tokens)</small></span>
        <input type="number" formControlName="context_window" min="1" />
      </label>
    </fieldset>

    <fieldset class="field-group">
      <legend>Prices ($/MTok)</legend>

      <label class="field">
        <span class="field__label">Input</span>
        <input type="number" formControlName="input_price" step="0.01" min="0" />
      </label>

      <label class="field">
        <span class="field__label">Output</span>
        <input type="number" formControlName="output_price" step="0.01" min="0" />
      </label>

      <label class="field">
        <span class="field__label">Cache read</span>
        <input type="number" formControlName="cache_read" step="0.001" min="0" />
      </label>

      <label class="field">
        <span class="field__label">Cache write</span>
        <input type="number" formControlName="cache_write" step="0.01" min="0" />
      </label>
    </fieldset>

    <fieldset class="field-group">
      <legend>Lifecycle</legend>

      <label class="field">
        <span class="field__label">Considered at <small>(ISO date)</small></span>
        <input type="text" formControlName="considered_at" placeholder="2026-04-15" />
      </label>

      <label class="field">
        <span class="field__label">Deprecated at <small>(ISO date — leave blank for active)</small></span>
        <input type="text" formControlName="deprecated_at" placeholder="" />
      </label>
    </fieldset>

    <label class="field">
      <span class="field__label">Notes <small>(markdown body — your reasoning)</small></span>
      <textarea formControlName="body" rows="12"></textarea>
    </label>

    @if (saveError(); as err) {
      <p class="error">{{ err }}</p>
    }

    <div class="model-form__actions">
      @if (isEdit()) {
        <button type="button" class="btn btn--danger" (click)="delete()" [disabled]="saving()">Delete</button>
        <a [routerLink]="['/models', ...(modelId()?.split('/') ?? [])]" class="btn">Cancel</a>
      } @else {
        <a routerLink="/models" class="btn">Cancel</a>
      }
      <button type="submit" class="btn btn--primary" [disabled]="saving() || form.invalid">
        {{ saving() ? 'Saving…' : (isEdit() ? 'Save' : 'Create') }}
      </button>
    </div>
  </form>
</div>
